name: Require Label
on:
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize]
permissions:
  pull-requests: read
jobs:
  require-label:
    name: Require Label
    runs-on: ubuntu-latest
    steps:
      - name: Ensure the PR carries at least one label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --json labels --jq '.labels | length')
          if [ "$count" -eq 0 ]; then
            echo "::error::This PR needs at least one label so Release Drafter can categorize it and resolve the version (e.g. breaking, enhancement, bug, changed, documentation)."
            exit 1
          fi
          echo "PR has $count label(s)."

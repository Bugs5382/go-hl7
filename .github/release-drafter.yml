name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  # What Changed 👀

  $CHANGES

  # Extra

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
# v7 config: version resolution is carried by each category's semver-increment
# (and standalone type: version-resolver entries); the highest matching increment wins.
categories:
  - title: 💥 Breaking Changes
    semver-increment: major
    when:
      label: breaking
  - title: 🚀 Features
    semver-increment: minor
    when:
      label: enhancement
  - title: 🐛 Bug Fixes
    semver-increment: patch
    when:
      label: bug
  - title: ⚠️ Changes
    semver-increment: patch
    when:
      label: changed
  - title: ⛔️ Deprecated
    semver-increment: patch
    when:
      label: deprecated
  - title: 🗑 Removed
    semver-increment: patch
    when:
      label: removed
  - title: 🔐 Security
    semver-increment: patch
    when:
      label: security
  - title: 📄 Documentation
    semver-increment: patch
    when:
      label: documentation
  - title: 🧩 Dependency Updates
    semver-increment: patch
    when:
      label: dependencies
    collapse-after: 5
  - title: Other Changes
  - type: version-resolver
    semver-increment: patch
    when:
      label: fix
  - type: version-resolver
    semver-increment: patch
    when:
      label: refactor
  - type: pre-exclude
    when:
      label: skip-changelog
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

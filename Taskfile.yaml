version: '3'
vars:
  ARTIFACT_NAME: go-hl7
  TESTPARALLELISM: 4
  GOLIC_VERSION: v0.2.0
  COMMON_LIC: "2026 Shane"
  TEMPLATE_LIC: "mit"
tasks:
  default:
    cmds:
      - task: lint
  fmt:
    desc: Format Go sources
    cmds:
      - gofmt -w .
      - goimports -w ./
  build:
    desc: Build all packages
    cmds:
      - go build ./...
  test:
    desc: Run tests
    cmds:
      - go test -parallel {{.TESTPARALLELISM}} ./...
  test-cover:
    desc: Run tests with coverage reporting
    cmds:
      - go test ./... -cover
  gen:
    desc: Regenerate committed spec metadata
    cmds:
      - go generate ./...
  lint-init:
    desc: Install linting dependencies via Brew
    cmds:
      - brew install golangci-lint gitleaks yamllint
      - go install golang.org/x/tools/cmd/goimports@latest
  lint:
    desc: Run all linters and license checks
    deps: [test, license]
    cmds:
      - gofmt -l .
      - goimports -w ./
      - golangci-lint run
      - yamllint .
      - gitleaks detect . --no-git --verbose --config=.gitleaks.toml
  license:
    desc: Inject license headers
    cmds:
      - task: golic-run
        vars: {CMD: inject}
  license-dry:
    desc: Dry run license injection
    cmds:
      - task: golic-run
        vars: {CMD: inject, DRY: true}
  license-remove:
    desc: Remove license headers
    cmds:
      - task: golic-run
        vars: {CMD: remove}
  license-remove-dry:
    desc: Dry run license removal
    cmds:
      - task: golic-run
        vars: {CMD: remove, DRY: true}
  golic-run:
    internal: true
    cmds:
      - go install github.com/Bugs5382/golic/cmd/golic@{{.GOLIC_VERSION}}
      - 'golic {{.CMD}} {{if .DRY}}-d {{end}}-t {{.TEMPLATE_LIC}} -c "{{.COMMON_LIC}}"'
